<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña - Inovamagic</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="card shadow p-4">
                    <h2 class="text-center mb-4" style="font-size: 24px; font-weight: bold;">Restablecer Contraseña</h2>
                    
                    <form method="POST">
                        <div class="mb-3">
                            <label for="email" class="form-label">Tu Correo Electrónico</label>
                            <input type="email" name="email" id="email" class="form-control" style="background-color: #fcfcfc; color: #495057; border: 1px solid #e0e0e0; border-radius: 50px; padding: 10px 20px; font-size: 14px;" placeholder="ejemplo@correo.com" required>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Nueva Contraseña</label>
                            <input type="password" name="password" id="password" class="form-control" style="background-color: #fcfcfc; color: #495057; border: 1px solid #e0e0e0; border-radius: 50px; padding: 10px 20px; font-size: 14px;" placeholder="Mínimo 6 caracteres" required>
                        </div>
                        <button type="submit" class="btn btn-success w-100">Actualizar Contraseña</button>
                    </form>

                </div>
            </div>
        </div>
    </div>
    <style>
  input::placeholder {
      color: #b0b5bc !important;
      opacity: 0.6 !important;
      font-weight: 300;
  }
</style>

</body>
</html>
