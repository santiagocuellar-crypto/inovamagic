<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña - Inovamagic</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f5f5f7;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 18px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            max-width: 360px;
            width: 100%;
            text-align: center;
        }
        h2 {
            font-weight: 600;
            color: #1d1d1f;
            margin-bottom: 10px;
            font-size: 24px;
            letter-spacing: -0.5px;
        }
        p {
            color: #86868b;
            font-size: 14px;
            margin-bottom: 30px;
        }
        input[type="email"] {
            width: 100%;
            padding: 14px;
            margin-bottom: 20px;
            border: 1px solid #d2d2d7;
            border-radius: 10px;
            font-size: 16px;
            background-color: #f5f5f7;
            color: #1d1d1f;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s ease;
        }
        input[type="email"]:focus {
            border-color: #0071e3;
        }
        button {
            width: 100%;
            padding: 14px;
            background-color: #000000;
            color: #ffffff;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }
        button:hover {
            background-color: #1d1d1f;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Recuperar contraseña</h2>
    <p>Introduce el correo de tu cuenta de Inovamagic.</p>
    
    <form action="/recuperar_contrasena" method="POST">
        <input type="email" name="correo" placeholder="Correo electrónico" required>
        <button type="submit">Continuar</button>
    </form>
</div>

</body>
</html>
