<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperación de Contraseña - Inovamagic</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="card shadow p-4">
                    <h2 class="text-center mb-4" style="font-size: 24px; font-weight: bold;">Recuperar Contraseña</h2>
                    
                    <form action="/recuperar" method="POST">
                        <div class="mb-3">
                            <label for="correo" class="form-label">Correo electrónico</label>
                            <input type="email" name="email" id="correo" class="form-control" placeholder="Ingrese su correo" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Enviar enlace de recuperación</button>
                    </form>

                </div>
            </div>
        </div>
    </div>

</body>
</html>
