<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inovamagic - Restablecer Contraseña</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            max-width: 420px;
            width: 90%;
            text-align: center;
        }
        h2 { color: #0f172a; margin-bottom: 5px; font-weight: 700; }
        p { color: #64748b; font-size: 14px; margin-bottom: 25px; }
        
        .form-group {
            text-align: left;
            margin-bottom: 20px;
            position: relative; /* For password toggle */
        }
        label { display: block; font-size: 13px; font-weight: 600; color: #1e293b; margin-bottom: 6px; }
        input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 14px;
            outline: none;
        }
        input:focus { border-color: #10b981; }

        .password-toggle {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(20%);
            cursor: pointer;
            color: #94a3b8;
        }
        
        .btn-submit {
            background: #0f172a;
            color: white;
            border: none;
            padding: 14px;
            width: 100%;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 15px;
            margin-bottom: 20px;
            transition: background 0.2s;
        }
        .btn-submit:hover { background: #1e293b; }
        
        .btn-back { display: inline-block; margin-top: 20px; color: #10b981; text-decoration: none; font-size: 14px; font-weight: 500; }
        
        .error-msg, .success-msg, .info-msg {
            background-color: #fef2f2;
            color: #991b1b;
            border-left: 4px solid #ef4444;
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 25px;
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            text-align: left;
        }
        .success-msg {
            background-color: #f0fdf4;
            color: #166534;
            border-left: 4px solid #10b981;
        }
        .info-msg {
            background-color: #eff6ff;
            color: #1e40af;
            border-left: 4px solid #3b82f6;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>Restablecer Contraseña</h2>
        <p>Introduce tu nueva contraseña.</p>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="{{ 'error-msg' if category == 'error' else 'success-msg' if category == 'success' else 'info-msg' }}">
                    <i class="fas {{ 'fa-exclamation-circle' if category == 'error' else 'fa-check-circle' if category == 'success' else 'fa-info-circle' }}"></i>
                    <span>{{ message }}</span>
                </div>
            {% endfor %}
        {% endif %}
        {% endwith %}

        <form action="{{ url_for('reset_password', token=token) }}" method="POST">
            <div class="form-group">
                <label for="new-password">Nueva Contraseña</label>
                <input type="password" id="new-password" name="password" placeholder="Introduce tu nueva clave de seguridad" required>
                <span class="password-toggle" onclick="togglePasswordVisibility('new-password')"><i class="fas fa-eye"></i></span>
            </div>
            <div class="form-group">
                <label for="confirm-password">Confirmar Contraseña</label>
                <input type="password" id="confirm-password" name="confirm_password" placeholder="Confirma tu nueva clave de seguridad" required>
                <span class="password-toggle" onclick="togglePasswordVisibility('confirm-password')"><i class="fas fa-eye"></i></span>
            </div>
            <button type="submit" class="btn-submit">Restablecer Contraseña</button>
        </form>
        
        <a href="{{ url_for('login_page') }}" class="btn-back"><i class="fas fa-arrow-left"></i> Volver al inicio de sesión</a>
    </div>

    <script>
        function togglePasswordVisibility(fieldId) {
            const passwordField = document.getElementById(fieldId);
            const toggleIcon = passwordField.nextElementSibling.querySelector('i');
            if (passwordField.type === 'password') {
                passwordField.type = 'text';
                toggleIcon.classList.remove('fa-eye');
                toggleIcon.classList.add('fa-eye-slash');
            } else {
                passwordField.type = 'password';
                toggleIcon.classList.remove('fa-eye-slash');
                toggleIcon.classList.add('fa-eye');
            }
        }
    </script>
</body>
</html>
