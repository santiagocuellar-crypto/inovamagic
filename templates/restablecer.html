<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restablecer Contraseña - Inovamagic</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="card shadow p-4">
                    <h2 class="text-center mb-4" style="font-size: 24px; font-weight: bold;">Nueva Contraseña</h2>
                    
                    <form action="" method="POST"></form>
                        <div class="mb-3">
                            <label for="password" class="form-label">Escriba su nueva contraseña</label>
                            <input type="password" name="password" id="password" class="form-control" placeholder="Mínimo 6 caracteres" required>
                        </div>
                        <button type="submit" class="btn btn-success w-100">Actualizar Contraseña</button>
                    </form>

                </div>
            </div>
        </div>
    </div>

</body>
</html>
