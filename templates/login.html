<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inovamagic - Iniciar Sesión</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .login-card {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            max-width: 400px;
            width: 90%;
            text-align: center;
        }
        h2 { color: #0f172a; margin-bottom: 5px; font-weight: 700; }
        p { color: #64748b; font-size: 14px; margin-bottom: 30px; }
        
        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }
        label { display: block; font-size: 13px; font-weight: 600; color: #1e293b; margin-bottom: 6px; }
        input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 14px;
            outline: none;
        }
        input:focus { border-color: #10b981; }
        
        .btn-submit {
            background: #0f172a;
            color: white;
            border: none;
            padding: 14px;
            width: 100%;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 15px;
            margin-bottom: 20px;
            transition: background 0.2s;
        }
        .btn-submit:hover { background: #1e293b; }
        
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            color: #94a3b8;
            font-size: 12px;
            margin-bottom: 20px;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #e2e8f0;
        }
        .divider:not(:empty)::before { margin-right: .5em; }
        .divider:not(:empty)::after { margin-left: .5em; }
        
        .btn-google {
            background: white;
            color: #475569;
            border: 1px solid #cbd5e1;
            padding: 12px;
            width: 100%;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            box-sizing: border-box;
            transition: background 0.2s;
        }
        .btn-google:hover { background: #f8fafc; }
        .btn-back { display: inline-block; margin-top: 20px; color: #10b981; text-decoration: none; font-size: 14px; font-weight: 500; }
        
        .error-msg {
            background-color: #fee2e2;
            color: #b91c1c;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 13px;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>Bienvenido</h2>
        <p>Ingresa a tu cuenta de Inovamagic Store</p>
        
        {% if error %}
        <div class="error-msg">
            <i class="fas fa-exclamation-circle"></i> {{ error }}
        </div>
        {% endif %}
        
        <form action="/login" method="POST">
            <div class="form-group">
                <label>Correo Electrónico</label>
                <input type="email" name="email" placeholder="santiago@evaristogarcia.com" required>
            </div>
            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" name="password" placeholder="12345" required>
            </div>
            <button type="submit" class="btn-submit">Ingresar al Sistema</button>
        </form>
        
        <div class="divider">O CONTINÚA CON</div>
        
        <a href="/login-google" class="btn-google">
            <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_Logo.svg" alt="Google" width="18">
            Iniciar sesión con Google
        </a>
        
        <a href="/" class="btn-back"><i class="fas fa-arrow-left"></i> Volver al catálogo</a>
    </div>

</body>
</html>
