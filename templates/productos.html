<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{{ p.nombre }} | Innovalogic</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --accent: #2563eb; 
            --text: #0f172a; 
            --bg: #f8fafc; 
            --white: #ffffff; 
            --border: rgba(226, 232, 240, 0.8);
            --ios-ease: cubic-bezier(0.4, 0, 0.2, 1);
        }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); padding: 16px; min-height: 100vh; }
        
        .container { max-width: 800px; margin: 0 auto; background: var(--white); border-radius: 24px; border: 1px solid var(--border); overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.02); }
        
        .back-btn { display: inline-flex; align-items: center; gap: 8px; background: transparent; border: none; color: var(--accent); font-weight: 700; font-size: 0.9rem; cursor: pointer; padding: 20px 24px 10px; text-decoration: none; }
        
        .detail-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; padding: 24px; }
        
        .image-gallery { width: 100%; aspect-ratio: 1/1; border-radius: 16px; overflow: hidden; background: #f1f5f9; border: 1px solid var(--border); }
        .image-gallery img { width: 100%; height: 100%; object-fit: cover; }
        
        .info-panel { display: flex; flex-direction: column; justify-content: space-between; }
        
        .badge { display: inline-block; background: rgba(37, 99, 235, 0.08); color: var(--accent); font-size: 0.7rem; font-weight: 800; padding: 4px 10px; border-radius: 20px; text-transform: uppercase; width: fit-content; margin-bottom: 8px; }
        
        h1 { font-size: 1.5rem; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 10px; line-height: 1.2; }
        
        .price-tag { font-size: 1.6rem; font-weight: 800; color: var(--text); margin-bottom: 15px; }
        
        .summary-box { background: rgba(100,116,139,0.04); border-radius: 14px; padding: 14px; font-size: 0.88rem; color: #475569; line-height: 1.5; margin-bottom: 20px; border-left: 4px solid var(--accent); }
        
        .meta-list { list-style: none; font-size: 0.8rem; color: #64748b; margin-bottom: 20px; display: flex; flex-direction: column; gap: 6px; }
        .meta-list li strong { color: var(--text); }

        .btn-buy { width: 100%; background: #0f172a; color: white; border: none; padding: 14px; border-radius: 14px; font-weight: 700; font-size: 0.95rem; cursor: pointer; transition: transform 0.2s var(--ios-ease); display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-buy:active { transform: scale(0.96); }

        @media (max-width: 640px) {
            .detail-layout { grid-template-columns: 1fr; gap: 16px; padding: 16px; }
            h1 { font-size: 1.3rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <a href="/" class="back-btn">⬅ Regresar a la Tienda</a>
        
        <div class="detail-layout">
            <div class="image-gallery">
                <img src="{{ p.img }}" alt="{{ p.nombre }}">
            </div>
            
            <div class="info-panel">
                <div>
                    {% if p.criterio %}
                    <span class="badge">{{ p.criterio }}</span>
                    {% endif %}
                    <h1>{{ p.nombre }}</h1>
                    <div class="price-tag">$ {{ p.precio_f }}</div>
                    
                    <div class="summary-box">
                        <strong>Descripción General:</strong><br>
                        {{ p.descripcion }}
                    </div>
                    
                    <ul class="meta-list">
                        <li><strong>Distribuidor:</strong> {{ p.prov }}</li>
                        <li><strong>Categoría:</strong> {{ p.cat.upper() }}</li>
                        <li><strong>Disponibilidad inmediata:</strong> {{ p.stock }} unidades</li>
                    </ul>
                </div>
                
                <button class="btn-buy" onclick="agregarYRegresar()">
                    🛒 Agregar a la Bolsa
                </button>
            </div>
        </div>
    </div>

    <script>
        function agregarYRegresar() {
            alert("¡Producto listo, mano! Volvamos a la tienda principal para configurar los datos de entrega en tu bolsa.");
            window.location.href = "/";
        }
    </script>
</body>
</html>
