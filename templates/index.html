<!DOCTYPE html>
<html lang="es" data-theme="{{ theme }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inovamagic Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #f5f5f7;
            --surface-color: #ffffff;
            --text-main: #1d1d1f;
            --text-secondary: #86868b;
            --accent-color: #0071e3;
            --accent-hover: #0077ed;
            --border-color: #d2d2d7;
            --card-shadow: rgba(0, 0, 0, 0.05);
        }
        [data-theme="dark"] {
            --bg-color: #000000;
            --surface-color: #1d1d1f;
            --text-main: #f5f5f7;
            --text-secondary: #86868b;
            --accent-color: #0071e3;
            --border-color: #424245;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
        }
        /* NOTIFICACIONES ÚNICAMENTE ARRIBA */
        #notification-container {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            width: 90%;
            max-width: 420px;
        }
        .notification {
            background-color: var(--accent-color);
            color: #ffffff;
            padding: 14px 24px;
            border-radius: 12px;
            margin-bottom: 12px;
            text-align: center;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
            font-size: 14px;
        }
        .navbar {
            background-color: var(--surface-color);
            border-bottom: 1px solid var(--border-color);
            padding: 10px 22px;
        }
        .navbar-container {
            max-width: 1120px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .auth-container {
            max-width: 380px;
            margin: 40px auto;
            padding: 40px 32px;
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            text-align: center;
        }
        .form-group { margin-bottom: 18px; }
        .form-control {
            width: 100%;
            box-sizing: border-box;
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            background-color: var(--bg-color);
            color: var(--text-main);
        }
        .btn-submit {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            background-color: var(--accent-color);
            color: #ffffff;
            cursor: pointer;
            font-weight: 500;
        }
        .auth-divider {
            margin: 24px 0;
            color: var(--text-secondary);
            font-size: 12px;
        }
        .social-auth-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .btn-social-auth {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            background-color: var(--surface-color);
            color: var(--text-main);
            cursor: pointer;
        }
        .showcase-container {
            max-width: 1120px;
            margin: 40px auto;
            padding: 0 22px;
        }
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 24px;
        }
        .product-card {
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 18px;
            padding: 20px;
            text-align: center;
        }
        .product-card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 12px;
        }
        .theme-toggle-floating {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 12px 18px;
            border-radius: 30px;
            border: 1px solid var(--border-color);
            background-color: var(--surface-color);
            color: var(--text-main);
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="notification-container"></div>

    <nav class="navbar">
        <div class="navbar-container">
            <div style="font-weight: 600;"><i class="fas fa-magic"></i> Inovamagic</div>
        </div>
    </nav>

    <main class="auth-container">
        <h2>Iniciar Sesión</h2>
        <form action="/login" method="POST">
            <div class="form-group">
                <input type="email" name="email" class="form-control" placeholder="Correo electrónico" required>
            </div>
            <div class="form-group">
                <input type="password" name="password" class="form-control" placeholder="Contraseña" required>
            </div>
            <button type="submit" class="btn-submit">Continuar</button>
        </form>

        <div class="auth-divider">o continuar con</div>

        <div class="social-auth-group">
            <button type="button" class="btn-social-auth" onclick="showTopNotification('Conectando con Google...')">
                <i class="fab fa-google" style="color: #db4437;"></i> Google
            </button>
            <button type="button" class="btn-social-auth" onclick="showTopNotification('Conectando con Apple...')">
                <i class="fab fa-apple"></i> Apple
            </button>
        </div>
    </main>

    <section class="showcase-container">
        <h2>Productos Destacados</h2>
        <div class="product-grid">
            {% for producto in productos %}
            <article class="product-card">
                <img src="{{ producto.imagen }}" alt="{{ producto.nombre }}">
                <h3>{{ producto.nombre }}</h3>
                <p style="font-size: 13px; color: var(--text-secondary);">{{ producto.descripcion }}</p>
                <div style="color: var(--accent-color); font-weight: 700; margin: 10px 0;">${{ "{:,.0f}".format(producto.precio) }}</div>
                <button class="btn-submit" style="padding: 8px;" onclick="showTopNotification('Añadido: {{ producto.nombre }}')">Ver detalles</button>
            </article>
            {% endfor %}
        </div>
    </section>

    <button class="theme-toggle-floating" onclick="toggleTheme()">Alternar Modo</button>

    <script>
        function showTopNotification(message) {
            const container = document.getElementById('notification-container');
            const toast = document.createElement('div');
            toast.className = 'notification';
            toast.innerText = message;
            container.appendChild(toast);
            setTimeout(() => { toast.remove(); }, 3000);
        }

        function toggleTheme() {
            const htmlNode = document.documentElement;
            let currentTheme = htmlNode.getAttribute('data-theme');
            let targetTheme = currentTheme === 'dark' ? 'light' : 'dark';
            htmlNode.setAttribute('data-theme', targetTheme);
            fetch('/save-theme', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ theme: targetTheme })
            });
            showTopNotification(`Modo ${targetTheme}`);
        }
    </script>
</body>
</html>
